# .github/workflows/ci.yml
name: OfficeHoursQ CI/CD Pipeline

on:
  push:
    branches: [main, sprint2]
  pull_request:
    branches: [main]

env:
  SUPABASE_URL: ${{ vars.SUPABASE_URL }}
  SUPABASE_KEY: ${{ vars.SUPABASE_KEY }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ vars.SUPABASE_SERVICE_ROLE_KEY }}

# ============================================================
# STAGE 1: Lint & Build
# ============================================================
jobs:
  lint-and-build:
    name: "Stage 1: Lint & Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Backend Lint ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint backend (Ruff)
        working-directory: ./server
        run: ruff check . --output-format=github || true

      # ---------- Frontend Lint & Build ----------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint frontend (ESLint)
        working-directory: ./client
        run: npm run lint || true

      - name: Build frontend (Next.js)
        working-directory: ./client
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: "https://placeholder.onrender.com"

  # ============================================================
  # STAGE 2: Backend Tests with Coverage
  # ============================================================
  backend-tests:
    name: "Stage 2: Backend Tests"
    runs-on: ubuntu-latest
    needs: lint-and-build
    env:
      JWT_SECRET: ${{ vars.JWT_SECRET }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run backend tests with coverage
        working-directory: ./server
        run: |
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            -v

      - name: Upload backend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./server/coverage.xml
          flags: backend
          name: backend-coverage
          token: ${{ vars.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: ./server/htmlcov/

  # ============================================================
  # STAGE 3: Frontend Tests with Coverage
  # ============================================================
  frontend-tests:
    name: "Stage 3: Frontend Tests"
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: ./client
        run: npx vitest run --coverage || true
        env:
          NEXT_PUBLIC_API_URL: "https://placeholder.onrender.com"

      - name: Upload frontend coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./client/coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
          token: ${{ vars.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # ============================================================
  # STAGE 4: Security Scanning
  # ============================================================
  security-scan:
    name: "Stage 4: Security Scan"
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- Backend Security ----------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        working-directory: ./server
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit

      - name: Audit Python dependencies
        working-directory: ./server
        run: pip-audit || true

      # ---------- Frontend Security ----------
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        working-directory: ./client
        run: npm ci

      - name: Audit Node dependencies
        working-directory: ./client
        run: npm audit --audit-level=high || true

  # ============================================================
  # STAGE 5: Deploy
  # ============================================================
  deploy:
    name: "Stage 5: Deploy to Production"
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests, security-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Trigger Render deploy
        run: curl -X POST "${{ vars.RENDER_DEPLOY_HOOK }}"

      - name: Deployment summary
        run: |
          echo "## Deployment Triggered" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: Render deploy hook triggered" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: Vercel auto-deploys from main branch" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
